<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Horizontal Menu Example</title>

  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <style>
    :root {
      --app-border: #dee2e6;
      --app-muted-bg: #f8f9fa;
      --app-menu-active-bg: #e7f1ff;
      --app-menu-active-color: #0d6efd;
    }

    body {
      background: #ffffff;
    }

    .app-header {
      background: linear-gradient(180deg, #f0f0f0 0%, #e6e6e6 100%);
      border-bottom: 1px solid var(--app-border);
      border-top: 1px solid var(--app-border);
    }

    .app-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0d6efd;
      color: #ffffff;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .horizontal-menu-wrapper {
      background: #ffffff;
      border-bottom: 1px solid var(--app-border);
      position: sticky;
      top: 0;
      z-index: 1020;
    }

    .horizontal-menu {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .horizontal-menu::-webkit-scrollbar {
      height: 6px;
    }

    .horizontal-menu::-webkit-scrollbar-thumb {
      background: #ced4da;
      border-radius: 999px;
    }

    .horizontal-menu .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #495057;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 10px;
      transition: background-color .15s ease, color .15s ease;
    }

    .horizontal-menu .nav-link:hover {
      color: #0d6efd;
      background: #f1f3f5;
    }

    .horizontal-menu .nav-link.active {
      color: var(--app-menu-active-color);
      background: var(--app-menu-active-bg);
    }

    .horizontal-menu .badge {
      font-weight: 500;
      border-radius: 999px;
    }

    .page-card {
      border: 1px solid var(--app-border);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .04);
    }

    .stat-card {
      border: 1px solid var(--app-border);
      border-radius: 14px;
      background: #ffffff;
    }

    .table-card {
      border: 1px solid var(--app-border);
      border-radius: 16px;
      overflow: hidden;
    }

    @media (max-width: 576px) {
      .horizontal-menu .nav-link {
        padding: 9px 12px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <div class="py-3" style="padding-left: 1.75rem; padding-right: 1.75rem;">

      <div class="d-flex align-items-center gap-3">
        <div class="fw-bold my-0" style="font-size: 1.25rem;">
          <span style="color: #343a40;">architet</span><span style="color: #e8672a;">IQ</span>
        </div>

        <div class="flex-grow-1">
          <div class="d-flex flex-wrap align-items-center gap-2">
            <!--<h6 class="mb-0">v0.0</h6>-->
            <span class="badge text-bg-light border">v0.0</span>
          </div>
        </div>

        <button
          class="btn btn-light border d-md-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mobileMenu"
          aria-controls="mobileMenu"
          aria-expanded="false"
          aria-label="Toggle menu"
        >
          <i class="bi bi-list" style="font-size: 1.25rem; -webkit-text-stroke: 0.5px;"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile dropdown menu -->
  <div class="collapse d-md-none border-bottom" id="mobileMenu">
    <nav class="px-3 py-2 bg-white">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="#">
            <i class="bi bi-house-door me-2"></i>Overview
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-list-check me-2"></i>Requirements
            <span class="badge text-bg-secondary ms-1">24</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-diagram-3 me-2"></i>Architecture
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-kanban me-2"></i>Scenarios
            <span class="badge text-bg-secondary ms-1">8</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-bug me-2"></i>Issues
            <span class="badge text-bg-secondary ms-1">3</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-shield-check me-2"></i>Compliance
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-bar-chart me-2"></i>Reports
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-gear me-2"></i>Settings
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Horizontal menu (desktop) -->
  <nav class="horizontal-menu-wrapper d-none d-md-block">
    <div class="container-fluid px-0">
      <ul class="nav horizontal-menu flex-nowrap px-3 px-md-4">
        <li class="nav-item">
          <a class="nav-link active" href="#">
            <i class="bi bi-house-door"></i>
            Overview
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-list-check"></i>
            Requirements
            <span class="badge text-bg-secondary">24</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-diagram-3"></i>
            Architecture
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-kanban"></i>
            Scenarios
            <span class="badge text-bg-secondary">8</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-bug"></i>
            Issues
            <span class="badge text-bg-secondary">3</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-shield-check"></i>
            Compliance
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-bar-chart"></i>
            Reports
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-gear"></i>
            Settings
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main content -->
  <main class="px-3 py-4">


  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
