<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub-like tabs</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .repo-tabs-wrapper {
      border-bottom: 1px solid #d8dee4;
      background: #f6f8fa;
    }

    .repo-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .repo-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 12px;
      color: #24292f;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      font-weight: 500;
    }

    .repo-tab:hover {
      color: #0969da;
      text-decoration: none;
      border-bottom-color: #d0d7de;
    }

    .repo-tab.active {
      font-weight: 600;
      border-bottom-color: #fd8c73;
      color: #24292f;
    }

    .repo-tab .badge {
      font-size: 12px;
      font-weight: 500;
      background: #eaeef2;
      color: #24292f;
      border-radius: 999px;
    }
  </style>
</head>
<body>

<header class="border-bottom">
  <div class="container py-3">
    <h1 class="h4 mb-1">aitetic / requirements-tool</h1>
    <div class="text-muted small">Example repository header</div>
  </div>
</header>

<nav class="repo-tabs-wrapper">
  <div class="container">
    <div class="repo-tabs">

      <a href="#" class="repo-tab active">
        <span>📁</span>
        <span>Code</span>
      </a>

      <a href="#" class="repo-tab">
        <span>⭕</span>
        <span>Issues</span>
        <span class="badge px-2">12</span>
      </a>

      <a href="#" class="repo-tab">
        <span>🔀</span>
        <span>Pull requests</span>
        <span class="badge px-2">4</span>
      </a>

      <a href="#" class="repo-tab">
        <span>▶️</span>
        <span>Actions</span>
      </a>

      <a href="#" class="repo-tab">
        <span>📊</span>
        <span>Projects</span>
      </a>

      <a href="#" class="repo-tab">
        <span>📖</span>
        <span>Wiki</span>
      </a>

      <a href="#" class="repo-tab">
        <span>🛡️</span>
        <span>Security</span>
      </a>

      <a href="#" class="repo-tab">
        <span>⚙️</span>
        <span>Settings</span>
      </a>

    </div>
  </div>
</nav>

<main class="container py-4">
  <h2 class="h5">Code content</h2>
  <p class="text-muted">
    Здесь будет содержимое активной вкладки.
  </p>
</main>

</body>
</html>
