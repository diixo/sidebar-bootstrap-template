<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horizontal Menu</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body {
        background: #f8f9fa;
    }

    .top-menu-wrapper {
      border-bottom: 1px solid #dee2e6;
      background: #ffffff;
    }

    .top-menu {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .top-menu .nav-link {
      color: #495057;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
    }

    .top-menu .nav-link:hover {
      color: #0d6efd;
      background: #f1f3f5;
    }

    .top-menu .nav-link.active {
      color: #0d6efd;
      background: #e7f1ff;
    }
  </style>
</head>
<body>

<header class="border-bottom bg-white">
  <div class="container py-3">
    <h1 class="h4 mb-0">Project Dashboard</h1>
  </div>
</header>

<nav class="top-menu-wrapper" style="padding-top: 4px; padding-bottom: 4px;">
  <div class="container">
    <ul class="nav top-menu">
      <li class="nav-item">
        <a class="nav-link active" href="#">Overview</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">Requirements</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">Architecture</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">Test Cases</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">Reports</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">Settings</a>
      </li>
    </ul>
  </div>
</nav>

<main class="container py-4">
  <h2 class="h5">Overview</h2>
  <p class="text-muted">
    Здесь содержимое активного раздела.
  </p>
</main>

</body>
</html>
